name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run lint

  test-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run test:coverage
        env:
          VITE_FIREBASE_API_KEY: "AIzaSyABCDEFGHIJKLMNOPQRSTUVWXYZ0123456"
          VITE_FIREBASE_AUTH_DOMAIN: "dummy-auth-domain"
          VITE_FIREBASE_PROJECT_ID: "dummy-project-id"
          VITE_FIREBASE_STORAGE_BUCKET: "dummy-storage-bucket"
          VITE_FIREBASE_MESSAGING_SENDER_ID: "dummy-sender-id"
          VITE_FIREBASE_APP_ID: "dummy-app-id"
          VITE_FIREBASE_MEASUREMENT_ID: "dummy-measurement-id"
      # Fails if coverage drops below the thresholds set in vite.config.js
