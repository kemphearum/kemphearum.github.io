name: Automated Database Sync (Backup)

on:
  schedule:
    # Runs at 00:00 and 12:00 UTC
    - cron: '0 */12 * * *'
  workflow_dispatch:
    # Allows manual triggering

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm install firebase-admin --no-save

      - name: Run Migration
        env:
          SA_SOURCE: ${{ secrets.SA_SOURCE_JSON }}
          SA_TARGET: ${{ secrets.SA_TARGET_JSON }}
        run: node migrate.cjs
