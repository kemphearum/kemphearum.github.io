name: Automated Database Sync (Backup)

on:
  repository_dispatch:
    types: [manual_database_sync]
  workflow_dispatch:
    # Allows manual triggering

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm install firebase-admin --no-save --legacy-peer-deps

      - name: Run Migration
        env:
          SA_SOURCE: ${{ secrets.SA_SOURCE_JSON }}
          SA_TARGET: ${{ secrets.SA_TARGET_JSON }}
        run: node migrate.cjs
