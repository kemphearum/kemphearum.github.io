name: Automated Database Sync (Backup)

on:
  schedule:
    # Runs at 00:00 and 12:00 UTC
    - cron: '0 */12 * * *'
  workflow_dispatch:
    # Allows manual triggering

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm install firebase-admin --no-save

      - name: Create Temporary Credentials
        env:
          SA_SOURCE: ${{ secrets.SA_SOURCE_JSON }}
          SA_TARGET: ${{ secrets.SA_TARGET_JSON }}
        run: |
          echo "$SA_SOURCE" > sa-source.json
          echo "$SA_TARGET" > sa-target.json

      - name: Validate JSON Credentials
        run: |
          node -e "try { JSON.parse(require('fs').readFileSync('sa-source.json')); console.log('✅ sa-source.json is valid') } catch (e) { console.error('❌ sa-source.json is invalid JSON'); process.exit(1) }"
          node -e "try { JSON.parse(require('fs').readFileSync('sa-target.json')); console.log('✅ sa-target.json is valid') } catch (e) { console.error('❌ sa-target.json is invalid JSON'); process.exit(1) }"

      - name: Run Migration
        run: node migrate.cjs

      - name: Cleanup
        if: always()
        run: rm -f sa-target.json sa-source.json
