name: Rebuild and Deploy Static OG Tags

on:
  schedule:
    # Runs every 6 hours
    - cron: "0 */6 * * *"
  workflow_dispatch:
    # Allows manual triggering from the GitHub Actions tab
  repository_dispatch:
    types: [manual_rebuild]
    
permissions:
  contents: read
  pages: write
  id-token: write
  actions: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build and Prerender
        run: |
          npm run build
          cp build/client/index.html build/client/404.html
        env:
          # If your app needs any build-time environment variables, add them here
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}

      - name: Clean up existing github-pages artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          artifacts=$(gh api repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts)
          artifact_ids=$(echo "$artifacts" | jq -r '.artifacts[] | select(.name == "github-pages") | .id')
          for id in $artifact_ids; do
            echo "Deleting duplicate artifact $id..."
            gh api --method DELETE repos/${{ github.repository }}/actions/artifacts/$id || true
          done

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./build/client

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4

      - name: Deploy to Primary Firebase Hosting
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-service-account.json
        run: |
          printf '%s' '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > "$GOOGLE_APPLICATION_CREDENTIALS"
          npx --yes firebase-tools@15.22.0 deploy --only hosting --project phearum-info --non-interactive

      - name: Deploy to Backup Firebase Hosting
        continue-on-error: true
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-service-account.json
        run: |
          printf '%s' '${{ secrets.FIREBASE_SERVICE_ACCOUNT_BACKUP }}' > "$GOOGLE_APPLICATION_CREDENTIALS"
          npx --yes firebase-tools@15.22.0 deploy --only hosting --project kem-phearum --non-interactive

      - name: Remove Firebase credentials
        if: always()
        run: rm -f "${{ runner.temp }}/firebase-service-account.json"
