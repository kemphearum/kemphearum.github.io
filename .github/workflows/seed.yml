name: Seed Firestore Database

on:
  workflow_dispatch:
    inputs:
      project:
        description: 'Firebase Project ID (phearum-info or kem-phearum)'
        required: true
        default: 'phearum-info'
        type: choice
        options:
          - phearum-info
          - kem-phearum

jobs:
  seed-data:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Authenticate to Primary Firebase
        if: ${{ github.event.inputs.project == 'phearum-info' }}
        id: auth-primary
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Authenticate to Backup Firebase
        if: ${{ github.event.inputs.project == 'kem-phearum' }}
        id: auth-backup
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BACKUP }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Run Seed Script
        run: node scripts/seed-sample-data.mjs --project ${{ github.event.inputs.project }}
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.event.inputs.project == 'phearum-info' && steps.auth-primary.outputs.credentials_file_path || steps.auth-backup.outputs.credentials_file_path }}
