name: Deploy Firestore Rules

on:
  push:
    branches:
      - main
    paths:
      - 'firestore.rules'
  workflow_dispatch:
    inputs:
      project:
        description: 'Firebase Project ID (phearum-info or kem-phearum)'
        required: true
        default: 'phearum-info'
        type: choice
        options:
          - phearum-info
          - kem-phearum

jobs:
  deploy-rules:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Authenticate to Primary Firebase
        if: ${{ github.event_name == 'push' || github.event.inputs.project == 'phearum-info' }}
        id: auth-primary
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Deploy Firestore Rules to Primary
        if: ${{ github.event_name == 'push' || github.event.inputs.project == 'phearum-info' }}
        run: npx --yes firebase-tools deploy --only firestore:rules --project phearum-info
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth-primary.outputs.credentials_file_path }}

      - name: Authenticate to Backup Firebase
        if: ${{ github.event_name == 'push' || github.event.inputs.project == 'kem-phearum' }}
        id: auth-backup
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BACKUP }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Deploy Firestore Rules to Backup
        if: ${{ github.event_name == 'push' || github.event.inputs.project == 'kem-phearum' }}
        continue-on-error: true
        run: npx --yes firebase-tools deploy --only firestore:rules --project kem-phearum
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth-backup.outputs.credentials_file_path }}
