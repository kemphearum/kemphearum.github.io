name: Deploy to GitHub Pages and Firebase

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "src/**"
      - "public/**"
      - "functions/**"
      - ".github/workflows/deploy.yml"
      - "package.json"
      - "package-lock.json"
      - "vite.config.js"
      - "react-router.config.ts"
      - "firebase.json"
      - "firestore.rules"
      - "firestore.indexes.json"

permissions:
  contents: read
  pages: write
  id-token: write
  actions: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Security gate (review F-05): hard-fail on CRITICAL CVEs (e.g. the
      # protobufjs RCE) so they cannot regress into a deploy. High/moderate
      # are reported but non-blocking until the breaking upgrades land.
      - name: Security audit (block on critical)
        run: npm audit --audit-level=critical

      - name: Security audit report (non-blocking)
        if: always()
        continue-on-error: true
        run: npm audit --omit=dev || true

      - name: Build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
        run: |
          npm run build
          cp build/client/index.html build/client/404.html
      - name: Clean up existing github-pages artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          artifacts=$(gh api repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts)
          artifact_ids=$(echo "$artifacts" | jq -r '.artifacts[] | select(.name == "github-pages") | .id')
          for id in $artifact_ids; do
            echo "Deleting duplicate artifact $id..."
            gh api --method DELETE repos/${{ github.repository }}/actions/artifacts/$id || true
          done

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./build/client

      - name: Upload dist for Firebase
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: ./build/client

  deploy-github-pages:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  deploy-firebase:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Download build-output
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: ./build/client

      - name: Authenticate to Primary Firebase
        id: auth-primary
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Deploy to Primary Firebase Hosting
        run: npx --yes firebase-tools@15.22.0 deploy --only hosting --project phearum-info --non-interactive
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth-primary.outputs.credentials_file_path }}

      - name: Authenticate to Backup Firebase
        id: auth-backup
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BACKUP }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Deploy to Backup Firebase Hosting
        continue-on-error: true
        run: npx --yes firebase-tools@15.22.0 deploy --only hosting --project kem-phearum --non-interactive
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth-backup.outputs.credentials_file_path }}
